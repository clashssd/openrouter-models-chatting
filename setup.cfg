[flake8]
max-line-length = 100
exclude = .git,__pycache__,.venv,build,dist,node_modules
ignore = E203,W503,E501

[tool:pytest]
testpaths = tests
python_files = test*.py
addopts = -v --tb=short

[coverage:run]
branch = True
source = ai,backend
omit = */tests/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
precision = 2

[mypy]
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
ignore_missing_imports = True

[pylint]
max-line-length = 100
disable = C0111,C0103
